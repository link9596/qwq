<script src="https://unpkg.com/@waline/client@v3/dist/waline.js" data-no-instant></script>

<script data-no-instant type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    let walineInstance = null;

    function initWaline() {
        const container = document.querySelector('#waline');
        if (container) {
            // 如果已存在实例，可先销毁（视 Waline API 而定）
            if (walineInstance && typeof walineInstance.destroy === 'function') {
                walineInstance.destroy();
            }
            walineInstance = init({
                el: '#waline',
                serverURL: 'https://social.atlinker.cn',
                path: window.location.pathname,
            });
        }
    }

    if (typeof InstantClick !== 'undefined') {
        InstantClick.on('change', function() {
            setTimeout(initWaline, 50);
        });
    } else {
        document.addEventListener('DOMContentLoaded', initWaline);
    }
</script>
